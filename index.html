<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CampusConnect QR</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .logo {
            width: 100px;
            margin-bottom: 15px;
        }

        h1 {
            margin-bottom: 10px;
            color: #1d3557;
        }

        p {
            color: #555;
            font-size: 18px;
        }

        .qr-code {
            width: 300px;
            max-width: 90%;
            margin: 20px auto;
            display: block;
        }

        .scan-text {
            font-size: 24px;
            font-weight: bold;
            color: #1d3557;
        }

        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Agar BBD University logo hai to yahan logo ka naam add kar sakti ho -->
        <!-- <img src="bbd-logo.png" class="logo"> -->

        <h1>🎓 CampusConnect QR</h1>

        <p>
            BBD University
        </p>

        <div class="scan-text">
            Scan Here and Find Your Location
        </div>

        <img
            src="qrcode.png"
            alt="CampusConnect QR Code"
            class="qr-code"
        >

        <p>
            Scan the QR code to find your examination room,
            floor, wing and timetable.
        </p>

        <div class="footer">
            First Year Student Examination Portal
        </div>

    </div>

</body>
</html>
